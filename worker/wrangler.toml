name = "temp-mail"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# 本配置仅依赖 Cloudflare 免费额度服务：
#   Workers / D1 / KV / R2 / Email Routing（+ 可选免费 Workers AI）
# 不使用付费特性：无 Queues、无标准 Durable Objects。
# ============================================================

# ===== 静态变量（非敏感）=====
[vars]
MAIL_DOMAINS = "example.com"
# 发件 / 回复功能：设为 "resend" 开启（需 `wrangler secret put RESEND_API_KEY`，
# 且每个作为发件人的 MAIL_DOMAINS 域名都需在 Resend 完成 SPF/DKIM 验证）；"none" 时仅收不发。
SEND_PROVIDER = "none"
ATTACHMENT_TTL_DAYS = "3"
MAIL_RETENTION_DAYS = "7"
# 设为 "1" 时 API 返回详细错误（仅排查用）；生产保持注释或 "0"。
# DEBUG_ERRORS = "0"

# ===== 需通过 `wrangler secret put <NAME>` 设置的机密（切勿写入本文件）=====
#   ADMIN_PASSWORD  管理员密码（保护 /api/admin/* 与 /health/deep）
#   SITE_PASSWORD   站点入口密码（可选；未设置时回退使用 ADMIN_PASSWORD）
#   JWT_SECRET      会话签名密钥（请用 >=32 字节强随机值）
#   PROXY_SECRET    反代共享密钥（可选；设置后 Worker 仅接受携带 X-Proxy-Secret 的请求，
#                   同一值需在 Pages 项目 Settings -> Variables 里也设置为 PROXY_SECRET）
#   RESEND_API_KEY / TELEGRAM_BOT_TOKEN  可选

# ===== D1：权威源 + 限流计数（免费）=====
[[d1_databases]]
binding = "DB"
database_name = "temp-mail"
database_id = "e47e90da-0490-466f-988d-d4569bdd1a58"

# ===== KV：热缓存 / 轻量配置（免费）=====
[[kv_namespaces]]
binding = "KV"
id = "20650da6c6e4409f8b92fc1c01462413"

# ===== R2：附件对象存储（免费 10GB）=====
# 建议：在 Cloudflare 控制台为该桶配置 Object lifecycle 规则（按 att/ 与 raw/ 前缀自动过期，
#   分别对齐 ATTACHMENT_TTL_DAYS 与 MAIL_RETENTION_DAYS），把清理交给平台；cron 全量扫描仅作兜底。
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "temp-mail-attachments"

# ===== Workers AI（可选，免费额度；不需要可注释掉，代码会自动降级为正则提取）=====
[ai]
binding = "AI"

# ===== 定时任务：附件/邮件/限流清理（免费）=====
[triggers]
crons = ["0 */6 * * *"]

# ============================================================
# （可选）如需可观测性指标看板，可启用 Analytics Engine（有免费额度）：
# 默认不启用；未绑定时 metrics 会自动降级为 console.log。
# [[analytics_engine_datasets]]
# binding = "METRICS"
# dataset = "temp_mail_metrics"
